<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Terminal</title>
    <link rel="stylesheet" href="/node_modules/@xterm/xterm/css/xterm.css" />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div>
          <h1>Web Terminal</h1>
          <p id="cwd">Waiting for shell</p>
        </div>
        <div id="connection-status" class="status-pill">Checking</div>
      </header>

      <main class="workspace">
        <section class="terminal-pane" aria-label="Terminal">
          <div class="pane-header">
            <span>Terminal</span>
            <button id="reconnect-terminal" type="button">Reconnect</button>
          </div>
          <div id="terminal" class="terminal-surface" role="application" aria-label="Interactive terminal"></div>
        </section>

        <aside class="assistant-pane" aria-label="Assistant">
          <div class="pane-header">
            <span>Assistant</span>
          </div>
          <div id="assistant-panel" class="assistant-panel">
            <h2>Command Assistant</h2>
            <p>Suggestions will appear here.</p>
          </div>
        </aside>
      </main>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
